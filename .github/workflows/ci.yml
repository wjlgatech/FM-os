name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # Schema gate + drift gate: data is well-formed AND README matches the generator.
      - run: make check

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Online half of the check: every URL in the README must resolve.
      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --config lychee.toml README.md
          fail: true
