# ─────────────────────────────────────────────────────────────────────────────
# jd_taxonomy.yml — the JD-fit rubric. SINGLE SOURCE OF TRUTH.
# scripts/jdfit.py scans a job description for each capability's keywords, then
# scores FM-os coverage of the ones the JD actually requires:
#   knowledge  = FM-os curates ≥1 repo (by category) or course/paper (by topic)
#   tooling    = an FM-os registry skill carries this capability's tag
# Coverage: covered (knowledge + tooling) · partial (knowledge only) · gap (neither).
# Discipline: no evidence ⇒ gap (never a fake "covered"). Each new JD reuses this
# file; gaps it surfaces become the next entries/skills to add — the flywheel.
# `kind: knowledge` marks a learn-only capability (tooling not expected).
# ─────────────────────────────────────────────────────────────────────────────
