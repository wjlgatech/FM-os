# Open-source repos. category: models|frameworks|finetuning|rl|eval|serving|compression
# slm: true if directly Small-Language-Model relevant.  `repo:` (owner/name) drives star-sync.
# Stars are filled automatically into data/_stars.yml — do not add a `stars:` field by hand.

- name: SmolLM / SmolLM2 / SmolLM3
