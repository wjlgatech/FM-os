  url: https://github.com/huggingface/smollm
  category: models
  slm: true
  blurb: "Fully open recipes, data, and weights for the 135M-3B SmolLM family, the reference open SLM line."
- name: Phi Cookbook
  repo: microsoft/PhiCookBook
