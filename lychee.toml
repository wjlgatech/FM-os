# Link-checker config. Curated lists point at many bot-protected sites
# (careers pages, course platforms) that return 403/429 to automated checkers
# even though they load fine in a browser — accept those. Exclude dynamic
# badge/image services and self-referential repo links (they resolve on GitHub).
accept = [200, 206, 403, 429]
max_retries = 2
retry_wait_time = 2
timeout = 20
user_agent = "Mozilla/5.0 (compatible; FM-os-linkcheck)"

exclude = [
  "^https://api\\.star-history\\.com",
  "^https://img\\.shields\\.io",
  "^https://contrib\\.rocks",
  "^https://awesome\\.re",
  "^https://github\\.com/wjlgatech/FM-os",
  "^https://web\\.eecs\\.umich\\.edu",   # valid site, untrusted TLS chain for bots
]
